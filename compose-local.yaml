services:
  api:
    image: vercount-api:local
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: ${API_PORT:-8080}
      REDIS_URL: redis://redis:6379/0
      SCRIPT_PATH: /app/public/js/client.min.js
      DEBUG: ${DEBUG:-false}
    depends_on:
      - redis
    ports:
      - "${API_PORT:-8080}:8080"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  redis-data:
